<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand-navy background, soft rounded corners -->
  <rect width="32" height="32" rx="4" fill="#141B3C"/>

  <!-- Hexagon frame (lifted from the logo, subtle) -->
  <path d="M16 4 L27 10 V22 L16 28 L5 22 V10 Z"
        stroke="#E6B637" stroke-width="1.2" fill="none" opacity="0.55"
        stroke-linejoin="miter"/>

  <!-- The letter G — drawn as a near-closed arc with a horizontal tongue.
       Start top-right, sweep counter-clockwise around, then tongue inward. -->
  <path d="M22 12 A8 8 0 1 0 22 20 V16 H17"
        stroke="#E6B637" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
